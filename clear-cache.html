<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>캐시 초기화</title></head><body style="font-family:-apple-system,BlinkMacSystemFont,'Noto Sans KR',sans-serif;padding:24px;background:#f7f3ed;color:#211d19"><h1>캐시 초기화 중...</h1><p id="msg">잠시만 기다려주세요.</p><script>(async()=>{try{if('caches'in window){const keys=await caches.keys();await Promise.all(keys.map(k=>caches.delete(k)));}if('serviceWorker'in navigator){const regs=await navigator.serviceWorker.getRegistrations();await Promise.all(regs.map(r=>r.unregister()));}localStorage.removeItem('interior_cache');document.getElementById('msg').textContent='완료되었습니다. 앱으로 이동합니다.';setTimeout(()=>location.href='./index.html?v=2.2.2',800);}catch(e){document.getElementById('msg').textContent='초기화 중 오류: '+e.message;}})();</script></body></html>
